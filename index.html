function getOverdueColor(dueDate,status,closedStatuses){
  if(!dueDate||(closedStatuses||[]).some(st=>st.toLowerCase()===(status||"").toLowerCase()))return null;
  const diff=Math.floor((new Date(TODAY)-new Date(dueDate))/86400000);
  if(diff<=0)return null;
  if(diff<=3)return"#F59E0B";
  if(diff<=7)return"#F97316";
  return"#EF4444";
}
function getOverdueDays(dueDate){
  return Math.floor((new Date(TODAY)-new Date(dueDate))/86400000);
}

function parseGvizDate(val) {
  if(!val) return "";
  const s = String(val);
  // gviz format: Date(2026,4,13,9,15,0) — month is 0-indexed
  const m = s.match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/);
  if(m) {
    const y=m[1], mo=String(+m[2]+1).padStart(2,"0"), d=String(m[3]).padStart(2,"0");
    const h=m[4]?String(m[4]).padStart(2,"0"):"00", mn=m[5]?String(m[5]).padStart(2,"0"):"00";
    return `${y}-${mo}-${d}T${h}:${mn}`;
  }
  return s;
}

function parseSheetData(values) {
  if(!values||values.length<2) return [];
  const headers = values[0].map(h=>String(h).trim().toLowerCase()
    .replace(/\s+/g,"_")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"") // strip diacritics for matching
  );
  // Log headers for debugging
  console.log("[Sheet] Headers found:", headers);
  return values.slice(1).map(row=>{
    const obj={};
    headers.forEach((h,i)=>{obj[h]=row[i]!==undefined&&row[i]!==null?row[i]:"";});
    // Map sheet columns to dashboard fields
    const mapped = {
      key:       String(obj.issue_key||obj.key||obj.ma_task||obj.ma||""),
      loai:      String(obj.loai||obj.loai_task||""),
      doi_tuong: String(obj.doi_tuong||obj.doi_tuong_task||""),
      nhom:      String(obj.nhom||obj.nhom_cong_viec||""),
      hang_muc:  String(obj.hang_muc||""),
      hang_muc_chuan: String(obj.hang_muc_chuan||""),
      hang_muc_con:   String(obj.hang_muc_con||""),
      assignee:  String(obj.assignee||obj.nguoi_thuc_hien||obj.nguoi_th||"Unassigned"),
      status:    String(obj.status||obj.trang_thai||""),
      due:       parseGvizDate(obj.due_date||obj.due||obj.han||obj.han_xu_ly||""),
      updated:   parseGvizDate(obj.updated||obj.ngay_cap_nhat||obj.cap_nhat||"") || parseGvizDate(obj.ngay_tao||obj.ngay_tao_||""),
      note:      String(obj.note||obj.description||obj.ghi_chu||""),
      work_type: String(obj.work_type||obj.worktype||obj.work_type||""),
    };
    return mapped;
  }).filter(d=>!!d.key);
}

async function fetchSheetData() {
  try {

    const url =
      "https://docs.google.com/spreadsheets/d/" +
      SHEET_ID +
      "/gviz/tq?tqx=out:json&sheet=" +
      encodeURIComponent(SHEET_TAB);

    const resp = await fetch(url);

    const text = await resp.text();

    // Strip JSONP wrapper: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
    const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)?.[1];
    if (!jsonStr) throw new Error("Không parse được response từ Sheet");

    const json = JSON.parse(jsonStr);

    const cols = json.table.cols.map(c => c.label || c.id);

    const rows = json.table.rows.map(r =>
      r.c
        ? r.c.map(cell => (cell ? cell.v || cell.f || "" : ""))
        : []
    );

    return parseSheetData([cols, ...rows]);

  } catch (err) {

    console.error("Sheet Error:", err);

    return [];
  }
}

function getCompletionRate(tasks, statusGroups) {
  const cancelledSt = (statusGroups.find(g=>g.id==="pending")?.jiraStatuses||[]).filter(s=>s.toLowerCase().includes("cancel"));
  const valid = tasks.filter(t=>!cancelledSt.some(s=>s.toLowerCase()===t.status.toLowerCase()));
  const closedSt = statusGroups.find(g=>g.id==="closed")?.jiraStatuses||[];
  const done = valid.filter(t=>closedSt.some(s=>s.toLowerCase()===t.status.toLowerCase()));
  return valid.length ? Math.round(done.length/valid.length*100) : 0;
}

function getGroupForStatus(status, groups) {
  for(const g of groups) if(g.jiraStatuses.some(s=>s.toLowerCase()===status.toLowerCase())) return g;
  return null;
}

function genBuckets(s,e,unit){const r=[],seen=new Set(),cur=new Date(s);while(cur<=e&&r.length<48){const k=getBucket(cur.toISOString(),unit);if(!seen.has(k)){seen.add(k);r.push(k);}if(unit==="hour")cur.setHours(cur.getHours()+1);else if(unit==="day")cur.setDate(cur.getDate()+1);else cur.setMonth(cur.getMonth()+1);}return r;}

function CalMonth({year,month,selStart,selEnd,hover,onDay,onHover,accent}){const first=new Date(year,month,1),last=new Date(year,month+1,0);const dow=(first.getDay()+6)%7;const cells=[...Array(dow).fill(null),...Array.from({length:last.getDate()},(_,i)=>new Date(year,month,i+1))];return(<div style={{minWidth:200}}><div style={{textAlign:"center",fontWeight:700,fontSize:12,color:"#C8D8F0",marginBottom:10}}>{MONTHS_VI[month]} {year}</div><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>{["T2","T3","T4","T5","T6","T7","CN"].map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:"#3B4E6B",fontWeight:600,padding:"3px 0"}}>{d}</div>)}</div><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>{cells.map((d,i)=>{if(!d)return<div key={i}/>;const ds=fmt(d),isSt=selStart&&fmt(parseDate(selStart))===ds,isEn=selEnd&&fmt(parseDate(selEnd))===ds,inRng=selStart&&(selEnd||hover)&&ds>=selStart&&ds<=(selEnd||hover),isFut=d>new Date(TODAY);return(<div key={i} onClick={()=>!isFut&&onDay(ds)} onMouseEnter={()=>!isFut&&onHover(ds)} style={{textAlign:"center",padding:"5px 1px",borderRadius:5,fontSize:11,cursor:isFut?"default":"pointer",background:isSt||isEn?accent:inRng?`${accent}25`:"transparent",color:isSt||isEn?"#fff":isFut?"#2A3A55":inRng?accent:"#8899BB",fontWeight:isSt||isEn?700:400}}>{d.getDate()}</div>);})}</div></div>);}

der:"1px solid rgba(255,255,255,0.08)",borderRadius:6,color:"#8899BB",padding:"3px 9px",cursor:"pointer",fontSize:13}}>‹</button><div style={{fontSize:10,color:phase==="start"?accent:"#00C9A7",fontWeight:600}}>{phase==="start"?"→ Ngày bắt đầu":"→ Ngày kết thúc"}{days&&<span style={{color:"#3B4E6B",marginLeft:6}}>· {days} ngày</span>}</div><button onClick={()=>{if(lm===11){setLm(0);setLy(y=>y+1);}else setLm(m=>m+1);}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:6,color:"#8899BB",padding:"3px 9px",cursor:"pointer",fontSize:13}}>›</button></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}><CalMonth year={ly} month={lm} selStart={sel.start} selEnd={sel.end} hover={hover} onDay={handleDay} onHover={setHover} accent={accent}/><CalMonth year={ry} month={rm} selStart={sel.start} selEnd={sel.end} hover={hover} onDay={handleDay} onHover={setHover} accent={accent}/></div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:14,paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.06)"}}><div style={{fontSize:11,color:"#4B5EA6"}}>{sel.start&&<span style={{marginRight:10}}><b style={{color:accent}}>Từ:</b> {fmtD(parseDate(sel.start))}</span>}{sel.end?<span><b style={{color:"#00C9A7"}}>Đến:</b> {fmtD(parseDate(sel.end))}</span>:<span style={{color:"#3B4E6B"}}>Chọn ngày kết thúc...</span>}</div><div style={{display:"flex",gap:8}}><button onClick={onClose} style={{padding:"6px 14px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#8899BB",cursor:"pointer",fontSize:11}}>Huỷ</button><button disabled={!sel.start||!sel.end} onClick={()=>onApply(sel.start,sel.end)} style={{padding:"6px 16px",background:sel.start&&sel.end?accent:"#2A3A55",border:"none",borderRadius:8,color:"#fff",cursor:sel.start&&sel.end?"pointer":"default",fontSize:11,fontWeight:600}}>Áp dụng</button></div></div></div></div>);}

function Heatmap({data,cfg,assignees}){const allN=[...NHOM_SD,...NHOM_VH],maxV=Math.max(...data.flat().map(c=>c.v),1);const ac=cfg.colors.accent;const rgb=ac.replace("#","").match(/.{2}/g).map(h=>parseInt(h,16)).join(",");return(<div style={{overflowX:"auto"}}><table style={{borderCollapse:"separate",borderSpacing:3,fontSize:10}}><thead><tr><th style={{padding:"0 8px 4px 0",minWidth:50}}/>{allN.map(n=><th key={n} style={{padding:"0 0 4px",color:"#4B5EA6",fontWeight:500,textAlign:"center",writingMode:"vertical-rl",transform:"rotate(180deg)",height:50,verticalAlign:"bottom",fontSize:9}}>{cfg.nhomLabels[n]?.split(" ")[0]}</th>)}</tr></thead><tbody>{data.map((row,ri)=><tr key={ri}><td style={{padding:"0 8px 0 0",color:"#6B7E9E",textAlign:"right",fontWeight:500,fontSize:11}}>{(assignees||[])[ri]}</td>{row.map((cell,ci)=>{const int=cell.v/maxV;return<td key={ci} title={`${(assignees||[])[ri]} × ${cfg.nhomLabels[allN[ci]]||allN[ci]}: ${cell.v}`} style={{width:28,height:22,background:cell.v===0?"rgba(255,255,255,0.02)":`rgba(${rgb},${0.08+int*.72})`,borderRadius:4,textAlign:"center",fontSize:9,color:cell.v===0?"transparent":int>.5?"#fff":ac,fontWeight:700,cursor:"default"}}>{cell.v||""}</td>})}</tr>)}</tbody></table><div style={{marginTop:6,display:"flex",alignItems:"center",gap:5,fontSize:9,color:"#3B4E6B"}}><span>0</span>{[.08,.3,.55,.75,.9].map((o,i)=><div key={i} style={{width:14,height:10,borderRadius:2,background:`rgba(${rgb},${o})`}}/>)}<span>Nhiều · Hover xem chi tiết</span></div></div>);}

function TaskCard({task,cfg,today,onRemove,compact}){
  const C=cfg.colors;
  const grp=getGroupForStatus(task.status,cfg.statusGroups);
  const todayMs=parseDate(today).getTime(),dueMs=parseDate(task.due).getTime();
  const diffD=Math.round((dueMs-todayMs)/86400000);
  const isClosed=grp?.id==="closed",isPending=grp?.id==="pending";
  const od=diffD<0&&!isClosed;
  const dueColor=od?C.danger:isClosed?(grp?.color||"#00C9A7"):diffD<=3?"#F59E0B":"#A0B0CC";
  const dueLabel=isClosed?"Đã hoàn thành":od?`Trễ ${-diffD} ngày`:diffD===0?"Đến hạn hôm nay":diffD===1?"Còn 1 ngày":`Còn ${diffD} ngày`;
  const avtIdx=AVT_COLORS.length; // color via hash
  const avtColor=AVT_COLORS[avtIdx>=0?avtIdx:0];
  const progressMap={open:5,inprogress:55,closed:100,pending:30};
  const progress=grp?progressMap[grp.id]||0:0;
  const stages=cfg.statusGroups.filter(g=>g.id!=="pending");
  const currentIdx=stages.findIndex(g=>g.id===grp?.id);
  return(<div style={{position:"relative",background:`linear-gradient(135deg, ${(grp?.color||C.accent)}10, ${C.surface})`,boxShadow:"0 2px 8px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,255,255,.05)",borderRadius:14,padding:"14px 16px 16px",overflow:"hidden",transition:"all .2s"}}>
    <div aria-hidden style={{position:"absolute",top:0,left:0,bottom:0,width:3,background:grp?.color||"#4B5EA6",borderRadius:"14px 0 0 14px"}}/>
    {onRemove&&<button onClick={onRemove} title="Bỏ task này" style={{position:"absolute",top:10,right:10,width:22,height:22,borderRadius:"50%",background:"rgba(255,255,255,0.06)",border:"none",color:"#7A8AA8",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}>✕</button>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,marginBottom:10,paddingRight:onRemove?22:0}}>
      <div style={{minWidth:0,flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
          <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.5px",color:"#5B6E8C",fontFamily:"monospace"}}>{task.key}</span>
          <span style={{padding:"1px 6px",borderRadius:8,fontSize:9,fontWeight:700,background:task.loai==="Squad"?`${C.squad}18`:task.loai==="Du_an"?`${C.duan}18`:`${C.vanhoa}18`,color:task.loai==="Squad"?C.squad:task.loai==="Du_an"?C.duan:C.vanhoa}}>{cfg.ui.loaiNames[task.loai]||task.loai}</span>
        </div>
        <div style={{fontSize:13,fontWeight:700,color:"#F0F4FF",lineHeight:1.3,letterSpacing:"-0.1px",overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{task.hang_muc}</div>
        <div style={{fontSize:10,color:"#5B6E8C",marginTop:3}}>{task.doi_tuong} · {cfg.nhomLabels[task.nhom]||task.nhom}</div>
      </div>
      {grp&&<span style={{padding:"3px 9px",borderRadius:12,fontSize:10,fontWeight:700,background:`${grp.color}1F`,color:grp.color,border:`1px solid ${grp.color}45`,whiteSpace:"nowrap",flexShrink:0}}>{grp.icon} {grp.label}</span>}
    </div>
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
        <span style={{fontSize:9,color:"#5B6E8C",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.7px"}}>Tiến độ</span>
        <span style={{fontSize:11,fontWeight:700,color:grp?.color||"#A0B0CC"}}>{progress}%</span>
      </div>
      <div style={{height:6,background:"rgba(255,255,255,0.05)",borderRadius:3,overflow:"hidden",position:"relative"}}>
        <div style={{height:"100%",width:`${progress}%`,background:`linear-gradient(90deg, ${grp?.color||"#4B5EA6"}, ${grp?.color||"#4B5EA6"}BB)`,borderRadius:3,transition:"width .5s"}}/>
      </div>
      {!isPending&&currentIdx>=0&&<div style={{display:"flex",justifyContent:"space-between",marginTop:6,gap:4}}>{stages.map((s,i)=>{const active=i<=currentIdx;return(<div key={s.id} style={{flex:1,textAlign:"center"}}><div style={{fontSize:8,color:active?s.color:"#3B4E6B",fontWeight:active?700:500,textTransform:"uppercase",letterSpacing:"0.4px"}}>{s.label}</div></div>);})}</div>}
      {isPending&&<div style={{marginTop:6,fontSize:10,color:grp.color,fontWeight:600,textAlign:"center"}}>⏸ Đang tạm hoãn / huỷ</div>}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
      <div style={{display:"flex",alignItems:"center",gap:9,padding:"8px 10px",background:"rgba(255,255,255,0.03)",borderRadius:9}}>
        <div style={{width:32,height:32,borderRadius:"50%",background:avtColor,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff",flexShrink:0,boxShadow:`0 2px 6px ${avtColor}55`}}>{task.assignee.slice(0,2)}</div>
        <div style={{minWidth:0}}>
          <div style={{fontSize:9,color:"#5B6E8C",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px"}}>Người thực hiện</div>
          <div style={{fontSize:12,color:"#E8EAF0",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{task.assignee}</div>
        </div>
      </div>
      <div style={{padding:"8px 10px",background:`${dueColor}0E`,border:`1px solid ${dueColor}28`,borderRadius:9}}>
        <div style={{fontSize:9,color:"#5B6E8C",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:2}}>Hạn</div>
        <div style={{display:"flex",alignItems:"baseline",gap:6,flexWrap:"wrap"}}>
          <span style={{fontSize:13,color:"#E8EAF0",fontWeight:700,lineHeight:1}}>{task.due.slice(8,10)}/{task.due.slice(5,7)}</span>
          <span style={{fontSize:10,color:dueColor,fontWeight:700,lineHeight:1}}>{dueLabel}</span>
        </div>
      </div>
    </div>
    {task.note&&!compact&&<div style={{marginTop:10,padding:"7px 10px",background:"rgba(123,158,255,0.04)",borderLeft:"2px solid rgba(123,158,255,0.25)",borderRadius:"0 8px 8px 0",fontSize:10,color:"#8899BB",lineHeight:1.45,fontStyle:"italic"}}>💬 {task.note}</div>}
  </div>);
}

function TaskDetailPanel({tasks,cfg,today,onClear,onRemove}){
  if(!tasks.length){
    return(<div style={{padding:"38px 20px",textAlign:"center"}}>
      <div style={{width:48,height:48,margin:"0 auto 12px",borderRadius:12,background:"rgba(123,158,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,opacity:.7}}>📋</div>
      <div style={{fontSize:13,color:"#8899BB",fontWeight:600,marginBottom:4}}>Chọn task để xem chi tiết</div>
      <div style={{fontSize:11,color:"#4B5EA6",maxWidth:340,margin:"0 auto",lineHeight:1.5}}>Click vào một dòng trong bảng để xem chi tiết · Tick checkbox để so sánh tối đa 6 task cùng lúc</div>

function DrillBanner({drill,data,onClose,onViewAll,accent}){
  if(!drill)return null;
  const tasks=data.filter(d=>drill.type==="assignee"?d.assignee===drill.key:drill.type==="hang_muc"?d.hang_muc===drill.key:drill.type==="hang_muc_chuan"?d.hang_muc_chuan===drill.key:false);
  const closed=tasks.filter(t=>t._grp&&t._grp.id==="closed").length;
  const pct=tasks.length?Math.round(closed/tasks.length*100):0;
  return(<div style={{position:"absolute",zIndex:150,background:"#0D1629",border:"1px solid rgba(255,255,255,0.12)",borderRadius:12,padding:"14px 16px",minWidth:300,maxWidth:380,boxShadow:"0 12px 40px rgba(0,0,0,.7)",top:40,left:20}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
      <div><div style={{fontSize:13,fontWeight:700,color:"#E8EAF0",marginBottom:3}}>{drill.label}</div><div style={{display:"flex",gap:8}}><span style={{fontSize:11,color:"#6B7E9E"}}>{tasks.length} tasks</span><span style={{fontSize:11,fontWeight:600,color:"#00C9A7"}}>{pct}% HT</span></div></div>
      <button onClick={onClose} style={{background:"rgba(255,255,255,0.05)",border:"none",borderRadius:6,color:"#6B7E9E",cursor:"pointer",width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>x</button>
    </div>
    <div style={{maxHeight:180,overflowY:"auto"}}>{tasks.slice(0,6).map((t,i)=><div key={t.key} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"5px 0",borderBottom:i<Math.min(tasks.length,6)-1?"1px solid rgba(255,255,255,0.04)":"none"}}><div style={{flex:1,minWidth:0}}><div style={{fontSize:11,color:"#C8D8F0",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.hang_muc||t.key}</div><div style={{fontSize:10,color:"#4B5EA6"}}>{t.key} - {t.assignee}</div></div>{t._grp&&<span style={{marginLeft:6,padding:"2px 6px",borderRadius:8,fontSize:9,fontWeight:700,background:t._grp.color+"18",color:t._grp.color,flexShrink:0}}>{t._grp.label}</span>}</div>)}</div>
    {tasks.length>6&&<div style={{marginTop:8,paddingTop:8,borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:10,color:"#3B4E6B"}}>+{tasks.length-6} khac</span><button onClick={()=>onViewAll(drill)} style={{fontSize:10,color:accent,cursor:"pointer",background:"none",border:"none",fontWeight:600}}>Xem tat ca</button></div>}
  </div>);

function exportToExcel(rows,filename){
  const H=["Issue Key","Work Type","Loai","Doi tuong","Nhom","Hang muc","HM Chuan","HM Con","Status","Assignee","Due Date","Note","Updated"];
  const csv=[H,...rows.map(d=>[d.key,d.work_type,d.loai,d.doi_tuong,d.nhom,d.hang_muc,d.hang_muc_chuan,d.hang_muc_con,d.status,d.assignee,d.due,d.note,d.updated])].map(r=>r.map(c=>'"'+(String(c||"").replace(/"/g,'""'))+'"').join(",")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=filename;a.click();
}

      {dueSoon.slice(0,4).map(t=><div key={t.key} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}><span style={{fontSize:11,color:"#A0B0CC"}}>{t.key} · {t.hang_muc||t.key}</span><span style={{fontSize:11,color:"#F59E0B",fontWeight:600}}>{t.due?.slice(5).replace("-","/")}</span></div>)}
      {dueSoon.length>4&&<div style={{fontSize:10,color:"#3B4E6B",marginTop:4}}>+{dueSoon.length-4} task khác...</div>}
    </div>}
    {overdue7.length>0&&<div style={{marginBottom:12,padding:"12px 14px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:10}}>
      <div style={{fontSize:12,fontWeight:600,color:"#EF4444",marginBottom:8}}>🔴 Trễ hạn hơn 1 tuần ({overdue7.length} task)</div>
      {overdue7.slice(0,4).map(t=><div key={t.key} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}><span style={{fontSize:11,color:"#A0B0CC"}}>{t.key} · {t.hang_muc||t.key}</span><span style={{fontSize:11,color:"#EF4444",fontWeight:600}}>{getOverdueDays(t.due)} ngày</span></div>)}
      {overdue7.length>4&&<div style={{fontSize:10,color:"#3B4E6B",marginTop:4}}>+{overdue7.length-4} task khác...</div>}
    </div>}
    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
      <button onClick={()=>{setShowAlert(false);setAlertDismissed(true);}} style={{padding:"8px 16px",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#8899BB",cursor:"pointer",fontSize:12}}>Bỏ qua</button>
      <button onClick={()=>{setShowAlert(false);toggle("statusGroup","open");}} style={{padding:"8px 18px",background:C.accent,border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:12,fontWeight:600}}>Xem task →</button>
    </div>
  </div>
</div>}
{showSettings&&<><div onClick={()=>setShowSettings(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:299}}/><SettingsPanel cfg={cfg} onUpdate={setCfg} allHMChuan={allHangMucChuan} configSaving={configSaving} configSaved={configSaved} onClose={()=>setShowSettings(false)} onReset={()=>{setCfg(DEFAULT_CONFIG);try{localStorage.removeItem("cm_cfg_v10");}catch{}}} onExport={()=>{const b=new Blob([JSON.stringify(cfg,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="dashboard_config.json";a.click();}}/></>}
    </div>
  );
}



const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DashboardApp));




















</script>
</body>
</html>
