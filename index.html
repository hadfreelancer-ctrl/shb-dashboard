function parseGvizDate(val) {
  if(!val) return "";
  const s = String(val);
  // gviz format: Date(2026,4,13,9,15,0) — month is 0-indexed
  const m = s.match(/Date\((\d+),(\d+),(\d+)(?:,(\d+),(\d+),(\d+))?\)/);
  if(m) {
    const y=m[1], mo=String(+m[2]+1).padStart(2,"0"), d=String(m[3]).padStart(2,"0");
    const h=m[4]?String(m[4]).padStart(2,"0"):"00", mn=m[5]?String(m[5]).padStart(2,"0"):"00";
    return `${y}-${mo}-${d}T${h}:${mn}`;
  }
  return s;
}

function parseSheetData(values) {
  if(!values||values.length<2) return [];
  const headers = values[0].map(h=>String(h).trim().toLowerCase()
    .replace(/\s+/g,"_")
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"") // strip diacritics for matching
  );
  // Log headers for debugging
  console.log("[Sheet] Headers found:", headers);
  return values.slice(1).map(row=>{
    const obj={};
    headers.forEach((h,i)=>{obj[h]=row[i]!==undefined&&row[i]!==null?row[i]:"";});
    // Map sheet columns to dashboard fields
    const mapped = {
      key:       String(obj.issue_key||obj.key||obj.ma_task||obj.ma||""),
      loai:      String(obj.loai||obj.loai_task||""),
      doi_tuong: String(obj.doi_tuong||obj.doi_tuong_task||""),
      nhom:      String(obj.nhom||obj.nhom_cong_viec||""),
      hang_muc:  String(obj.hang_muc||""),
      hang_muc_chuan: String(obj.hang_muc_chuan||""),
      hang_muc_con:   String(obj.hang_muc_con||""),
      assignee:  String(obj.assignee||obj.nguoi_thuc_hien||obj.nguoi_th||"Unassigned"),
      status:    String(obj.status||obj.trang_thai||""),
      due:       parseGvizDate(obj.due_date||obj.due||obj.han||obj.han_xu_ly||""),
      updated:   parseGvizDate(obj.updated||obj.ngay_cap_nhat||obj.cap_nhat||""),
      note:      String(obj.note||obj.description||obj.ghi_chu||""),
    };
    return mapped;
  }).filter(d=>d.key);
}

async function fetchSheetData() {
  try {

    const url =
      "https://docs.google.com/spreadsheets/d/" +
      SHEET_ID +
      "/gviz/tq?tqx=out:json&sheet=" +
      encodeURIComponent(SHEET_TAB);

    const resp = await fetch(url);

    const text = await resp.text();

    // Strip JSONP wrapper: /*O_o*/\ngoogle.visualization.Query.setResponse({...});
    const jsonStr = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)?.[1];
    if (!jsonStr) throw new Error("Không parse được response từ Sheet");

    const json = JSON.parse(jsonStr);

    const cols = json.table.cols.map(c => c.label || c.id);

    const rows = json.table.rows.map(r =>
      r.c
        ? r.c.map(cell => (cell ? cell.v || cell.f || "" : ""))
        : []
    );

    return parseSheetData([cols, ...rows]);

  } catch (err) {

    console.error("Sheet Error:", err);

    return [];
  }
}

  { id:"open",       label:"Chưa xử lý",          color:"#7A8AA8", icon:"○",  jiraStatuses:["OPEN","Open","Backlog"] },

function getCompletionRate(tasks, statusGroups) {
  const cancelledSt = (statusGroups.find(g=>g.id==="pending")?.jiraStatuses||[]).filter(s=>s.toLowerCase().includes("cancel"));
  const valid = tasks.filter(t=>!cancelledSt.some(s=>s.toLowerCase()===t.status.toLowerCase()));
  const closedSt = statusGroups.find(g=>g.id==="closed")?.jiraStatuses||[];
  const done = valid.filter(t=>closedSt.some(s=>s.toLowerCase()===t.status.toLowerCase()));
  return valid.length ? Math.round(done.length/valid.length*100) : 0;
}

function getGroupForStatus(status, groups) {
  for(const g of groups) if(g.jiraStatuses.some(s=>s.toLowerCase()===status.toLowerCase())) return g;
  return null;
}

function getBucket(iso,unit){const d=new Date(iso);if(unit==="hour")return`${pad(d.getHours())}h`;if(unit==="day")return`${pad(d.getDate())}/${pad(d.getMonth()+1)}`;return`T${pad(d.getMonth()+1)}`;}
function genBuckets(s,e,unit){const r=[],seen=new Set(),cur=new Date(s);while(cur<=e&&r.length<48){const k=getBucket(cur.toISOString(),unit);if(!seen.has(k)){seen.add(k);r.push(k);}if(unit==="hour")cur.setHours(cur.getHours()+1);else if(unit==="day")cur.setDate(cur.getDate()+1);else cur.setMonth(cur.getMonth()+1);}return r;}

function Donut({pct,color,size=52}){const r=18,c=26,ci=2*Math.PI*r,d=ci*pct/100;return(<svg width={size} height={size} viewBox="0 0 52 52"><circle cx={c} cy={c} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={5}/><circle cx={c} cy={c} r={r} fill="none" stroke={color} strokeWidth={5} strokeDasharray={`${d} ${ci-d}`} strokeLinecap="round" transform="rotate(-90 26 26)" style={{transition:"stroke-dasharray .6s"}}/><text x={c} y={c+1} textAnchor="middle" dominantBaseline="middle" fill={color} fontSize="9" fontWeight="700">{pct}%</text></svg>);}
function Sparkline({data,color}){if(!data||data.length<2)return<div style={{width:80,height:28}}/>;const vals=data.map(d=>d.v),mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;const W=80,H=28,pts=vals.map((v,i)=>`${i/(vals.length-1)*W},${H-(v-mn)/rng*(H-4)+2}`).join(" ");const lx=W,ly=H-(vals[vals.length-1]-mn)/rng*(H-4)+2;return(<svg width={W} height={H}><polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" opacity=".85"/><circle cx={lx} cy={ly} r="2.5" fill={color}/></svg>);}
function Bar3({done,ip,bl,total,clrs,h=3}){if(!total)return null;return(<div style={{height:h,background:"rgba(255,255,255,0.05)",borderRadius:3,display:"flex",overflow:"hidden"}}><div style={{width:`${done/total*100}%`,background:clrs[0],transition:"width .5s"}}/><div style={{width:`${ip/total*100}%`,background:clrs[1],transition:"width .5s"}}/><div style={{width:`${bl/total*100}%`,background:clrs[2],transition:"width .5s"}}/></div>);}

function CalMonth({year,month,selStart,selEnd,hover,onDay,onHover,accent}){const first=new Date(year,month,1),last=new Date(year,month+1,0);const dow=(first.getDay()+6)%7;const cells=[...Array(dow).fill(null),...Array.from({length:last.getDate()},(_,i)=>new Date(year,month,i+1))];return(<div style={{minWidth:200}}><div style={{textAlign:"center",fontWeight:700,fontSize:12,color:"#C8D8F0",marginBottom:10}}>{MONTHS_VI[month]} {year}</div><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>{["T2","T3","T4","T5","T6","T7","CN"].map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:"#3B4E6B",fontWeight:600,padding:"3px 0"}}>{d}</div>)}</div><div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>{cells.map((d,i)=>{if(!d)return<div key={i}/>;const ds=fmt(d),isSt=selStart&&fmt(parseDate(selStart))===ds,isEn=selEnd&&fmt(parseDate(selEnd))===ds,inRng=selStart&&(selEnd||hover)&&ds>=selStart&&ds<=(selEnd||hover),isFut=d>new Date(TODAY);return(<div key={i} onClick={()=>!isFut&&onDay(ds)} onMouseEnter={()=>!isFut&&onHover(ds)} style={{textAlign:"center",padding:"5px 1px",borderRadius:5,fontSize:11,cursor:isFut?"default":"pointer",background:isSt||isEn?accent:inRng?`${accent}25`:"transparent",color:isSt||isEn?"#fff":isFut?"#2A3A55":inRng?accent:"#8899BB",fontWeight:isSt||isEn?700:400}}>{d.getDate()}</div>);})}</div></div>);}
function DatePicker({start,end,onApply,onClose,accent}){const[sel,setSel]=useState({start,end});const[hover,setHover]=useState(null);const[phase,setPhase]=useState(!end?"end":"start");const[lm,setLm]=useState(4);const[ly,setLy]=useState(2026);const rm=lm===11?0:lm+1,ry=lm===11?ly+1:ly;const days=sel.start&&sel.end?diffDays(parseDate(sel.start),parseDate(sel.end))+1:null;const handleDay=ds=>{if(phase==="start"){setSel({start:ds,end:null});setPhase("end");}else{setSel(p=>({start:ds<p.start?ds:p.start,end:ds<p.start?p.start:ds}));setPhase("start");}};const P=[{l:"Hôm nay",s:TODAY,e:TODAY},{l:"7 ngày",s:fmt(new Date(new Date(TODAY).getTime()-6*864e5)),e:TODAY},{l:"30 ngày",s:fmt(new Date(new Date(TODAY).getTime()-29*864e5)),e:TODAY},{l:"Tháng này",s:"2026-05-01",e:TODAY},{l:"Tháng trước",s:"2026-04-01",e:"2026-04-30"},{l:"3 tháng",s:fmt(new Date(new Date(TODAY).getTime()-89*864e5)),e:TODAY},{l:"Năm nay",s:"2026-01-01",e:TODAY}];return(<div style={{position:"absolute",top:"calc(100% + 8px)",left:0,zIndex:200,background:"#0D1629",border:"1px solid rgba(255,255,255,0.1)",borderRadius:14,boxShadow:"0 20px 60px rgba(0,0,0,.6)",display:"flex",minWidth:560}}><div style={{width:130,borderRight:"1px solid rgba(255,255,255,0.06)",padding:"14px 8px",flexShrink:0}}><div style={{fontSize:9,color:"#3B4E6B",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:8,paddingLeft:6}}>Nhanh</div>{P.map(p=><div key={p.l} onClick={()=>{setSel({start:p.s,end:p.e});setPhase("start");}} style={{padding:"5px 10px",borderRadius:7,fontSize:11,color:sel.start===p.s&&sel.end===p.e?accent:"#6B7E9E",cursor:"pointer",marginBottom:2,background:sel.start===p.s&&sel.end===p.e?`${accent}18`:"transparent"}}>{p.l}</div>)}</div><div style={{flex:1,padding:"14px 18px"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><button onClick={()=>{if(lm===0){setLm(11);setLy(y=>y-1);}else setLm(m=>m-1);}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:6,color:"#8899BB",padding:"3px 9px",cursor:"pointer",fontSize:13}}>‹</button><div style={{fontSize:10,color:phase==="start"?accent:"#00C9A7",fontWeight:600}}>{phase==="start"?"→ Ngày bắt đầu":"→ Ngày kết thúc"}{days&&<span style={{color:"#3B4E6B",marginLeft:6}}>· {days} ngày</span>}</div><button onClick={()=>{if(lm===11){setLm(0);setLy(y=>y+1);}else setLm(m=>m+1);}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:6,color:"#8899BB",padding:"3px 9px",cursor:"pointer",fontSize:13}}>›</button></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}><CalMonth year={ly} month={lm} selStart={sel.start} selEnd={sel.end} hover={hover} onDay={handleDay} onHover={setHover} accent={accent}/><CalMonth year={ry} month={rm} selStart={sel.start} selEnd={sel.end} hover={hover} onDay={handleDay} onHover={setHover} accent={accent}/></div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:14,paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.06)"}}><div style={{fontSize:11,color:"#4B5EA6"}}>{sel.start&&<span style={{marginRight:10}}><b style={{color:accent}}>Từ:</b> {fmtD(parseDate(sel.start))}</span>}{sel.end?<span><b style={{color:"#00C9A7"}}>Đến:</b> {fmtD(parseDate(sel.end))}</span>:<span style={{color:"#3B4E6B"}}>Chọn ngày kết thúc...</span>}</div><div style={{display:"flex",gap:8}}><button onClick={onClose} style={{padding:"6px 14px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#8899BB",cursor:"pointer",fontSize:11}}>Huỷ</button><button disabled={!sel.start||!sel.end} onClick={()=>onApply(sel.start,sel.end)} style={{padding:"6px 16px",background:sel.start&&sel.end?accent:"#2A3A55",border:"none",borderRadius:8,color:"#fff",cursor:sel.start&&sel.end?"pointer":"default",fontSize:11,fontWeight:600}}>Áp dụng</button></div></div></div></div>);}

function TaskCard({task,cfg,today,onRemove,compact}){

  const diffD=Math.round((dueMs-todayMs)/86400000);
  const isClosed=grp?.id==="closed",isPending=grp?.id==="pending";
  const od=diffD<0&&!isClosed;
  const dueColor=od?C.danger:isClosed?(grp?.color||"#00C9A7"):diffD<=3?"#F59E0B":"#A0B0CC";
  const dueLabel=isClosed?"Đã hoàn thành":od?`Trễ ${-diffD} ngày`:diffD===0?"Đến hạn hôm nay":diffD===1?"Còn 1 ngày":`Còn ${diffD} ngày`;
  const avtIdx=ASSIGNEES.indexOf(task.assignee);
  const avtColor=AVT_COLORS[avtIdx>=0?avtIdx:0];
  const progressMap={open:5,inprogress:55,closed:100,pending:30};
  const progress=grp?progressMap[grp.id]||0:0;
  const stages=cfg.statusGroups.filter(g=>g.id!=="pending");
  const currentIdx=stages.findIndex(g=>g.id===grp?.id);
  return(<div style={{position:"relative",background:`linear-gradient(135deg, ${(grp?.color||C.accent)}10, ${C.surface})`,boxShadow:"0 2px 8px rgba(0,0,0,.28), inset 0 0 0 1px rgba(255,255,255,.05)",borderRadius:14,padding:"14px 16px 16px",overflow:"hidden",transition:"all .2s"}}>
    <div aria-hidden style={{position:"absolute",top:0,left:0,bottom:0,width:3,background:grp?.color||"#4B5EA6",borderRadius:"14px 0 0 14px"}}/>
    {onRemove&&<button onClick={onRemove} title="Bỏ task này" style={{position:"absolute",top:10,right:10,width:22,height:22,borderRadius:"50%",background:"rgba(255,255,255,0.06)",border:"none",color:"#7A8AA8",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2}}>✕</button>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,marginBottom:10,paddingRight:onRemove?22:0}}>
      <div style={{minWidth:0,flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
          <span style={{fontSize:9,fontWeight:700,letterSpacing:"0.5px",color:"#5B6E8C",fontFamily:"monospace"}}>{task.key}</span>
          <span style={{padding:"1px 6px",borderRadius:8,fontSize:9,fontWeight:700,background:task.loai==="Squad"?`${C.squad}18`:task.loai==="Du_an"?`${C.duan}18`:`${C.vanhoa}18`,color:task.loai==="Squad"?C.squad:task.loai==="Du_an"?C.duan:C.vanhoa}}>{cfg.ui.loaiNames[task.loai]||task.loai}</span>
        </div>
        <div style={{fontSize:13,fontWeight:700,color:"#F0F4FF",lineHeight:1.3,letterSpacing:"-0.1px",overflow:"hidden",textOverflow:"ellipsis",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{task.hang_muc}</div>
        <div style={{fontSize:10,color:"#5B6E8C",marginTop:3}}>{task.doi_tuong} · {cfg.nhomLabels[task.nhom]||task.nhom}</div>
      </div>
      {grp&&<span style={{padding:"3px 9px",borderRadius:12,fontSize:10,fontWeight:700,background:`${grp.color}1F`,color:grp.color,border:`1px solid ${grp.color}45`,whiteSpace:"nowrap",flexShrink:0}}>{grp.icon} {grp.label}</span>}
    </div>
    <div style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:5}}>
        <span style={{fontSize:9,color:"#5B6E8C",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.7px"}}>Tiến độ</span>
        <span style={{fontSize:11,fontWeight:700,color:grp?.color||"#A0B0CC"}}>{progress}%</span>
      </div>
      <div style={{height:6,background:"rgba(255,255,255,0.05)",borderRadius:3,overflow:"hidden",position:"relative"}}>

      </div>
      {!isPending&&currentIdx>=0&&<div style={{display:"flex",justifyContent:"space-between",marginTop:6,gap:4}}>{stages.map((s,i)=>{const active=i<=currentIdx;return(<div key={s.id} style={{flex:1,textAlign:"center"}}><div style={{fontSize:8,color:active?s.color:"#3B4E6B",fontWeight:active?700:500,textTransform:"uppercase",letterSpacing:"0.4px"}}>{s.label}</div></div>);})}</div>}

        <div style={{display:"flex",alignItems:"baseline",gap:6,flexWrap:"wrap"}}>
          <span style={{fontSize:13,color:"#E8EAF0",fontWeight:700,lineHeight:1}}>{task.due.slice(8,10)}/{task.due.slice(5,7)}</span>
          <span style={{fontSize:10,color:dueColor,fontWeight:700,lineHeight:1}}>{dueLabel}</span>
        </div>
      </div>
    </div>
    {task.note&&!compact&&<div style={{marginTop:10,padding:"7px 10px",background:"rgba(123,158,255,0.04)",borderLeft:"2px solid rgba(123,158,255,0.25)",borderRadius:"0 8px 8px 0",fontSize:10,color:"#8899BB",lineHeight:1.45,fontStyle:"italic"}}>💬 {task.note}</div>}
  </div>);
}

function TaskDetailPanel({tasks,cfg,today,onClear,onRemove}){

      <div style={{width:48,height:48,margin:"0 auto 12px",borderRadius:12,background:"rgba(123,158,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,opacity:.7}}>📋</div>

const DashboardApp = function Dashboard(){

  const ACTIVE_DATA = liveData||RAW;
  const MAX_SEL=6;
  const pickerRef=useRef(null);const logoInputRef=useRef(null);const PER=20;
  const C=cfg.colors;const SG=cfg.statusGroups;

  useEffect(()=>{try{localStorage.setItem("cm_cfg_v10",JSON.stringify(cfg));}catch{};},[cfg]);
  
  // Fetch sheet data on mount + auto-refresh every 5 min
  const doFetch = async()=>{
    setLoading(true);setSyncError(null);
    try{
      const rows=await fetchSheetData();
      console.log("[Dashboard] Rows fetched:", rows.length, rows[0]||"(empty)");
      setDebugInfo(`Sheet trả về ${rows.length} dòng${rows.length>0?" · Dòng đầu: key="+rows[0].key+", status="+rows[0].status+", updated="+rows[0].updated:"" }`);
      if(rows.length>0){setLiveData(rows);setLastSync(new Date());}
      else{setSyncError("Sheet trả về 0 dòng — kiểm tra tên cột và date range");}
    }catch(e){setSyncError(e.message);}
    finally{setLoading(false);}
  };
  useEffect(()=>{doFetch();const t=setInterval(doFetch,5*60*1000);return()=>clearInterval(t);},[]);
  useEffect(()=>{const fn=e=>{if(pickerRef.current&&!pickerRef.current.contains(e.target))setShowPicker(false);};document.addEventListener("mousedown",fn);return()=>document.removeEventListener("mousedown",fn);},[]);

  const toggle=(k,v)=>{setF(p=>({...p,[k]:p[k]===v?null:v}));setPage(1);};
  const clearAll=()=>{setF({loai:null,doi_tuong:null,nhom:null,assignee:null,statusGroup:null,hang_muc:null,hang_muc_chuan:null});setSearch("");setPage(1);};
  const activeCount=Object.values(f).filter(Boolean).length;
  const startDate=parseDate(dateRange.start),endDate=parseDate(dateRange.end);
  const days=diffDays(startDate,endDate)+1,unit=getUnit(days),unitLbl=getUnitLabel(unit);
  const prevEnd=new Date(startDate.getTime()-864e5),prevStart=new Date(prevEnd.getTime()-(days-1)*864e5);
  const prevLabel=`${fmtD(prevStart)}–${fmtD(prevEnd)}`;
  const inRange=d=>d.updated>=dateRange.start&&d.updated<=dateRange.end+"T23:59:59";
  const rangeRaw=ACTIVE_DATA.filter(inRange);
  const prevRaw=ACTIVE_DATA.filter(d=>d.updated>=fmt(prevStart)&&d.updated<=fmt(prevEnd)+"T23:59:59");
  const getGrp=status=>getGroupForStatus(status,SG);

  const data=useMemo(()=>rangeRaw.filter(d=>{
    if(f.loai&&d.loai!==f.loai)return false;
    if(f.doi_tuong&&d.doi_tuong!==f.doi_tuong)return false;
    if(f.nhom&&d.nhom!==f.nhom)return false;

    if(f.statusGroup){const grp=getGrp(d.status);if(!grp||grp.id!==f.statusGroup)return false;}
    if(f.hang_muc&&d.hang_muc!==f.hang_muc)return false;
    if(f.hang_muc_chuan&&d.hang_muc_chuan!==f.hang_muc_chuan)return false;
    return true;
  }),[f,dateRange,cfg.statusGroups,liveData]);

  const total=data.length;
  const sN=data.filter(d=>d.loai==="Squad").length,dN=data.filter(d=>d.loai==="Du_an").length,vN=data.filter(d=>d.loai==="Van_hoa").length;
  const grpCount=id=>data.filter(d=>{const g=getGrp(d.status);return g&&g.id===id;}).length;
  const overdue=data.filter(d=>d.due<TODAY&&getGrp(d.status)?.id!=="closed").length;
  const delta=(c,p)=>p?Math.round((c-p)/p*100):0;
  const dSign=n=>n>=0?`↑ ${n}%`:`&#8595; ${Math.abs(n)}%`;
  const dColor=n=>n>=0?"#00C9A7":"#EF4444";

  const buckets=genBuckets(startDate,endDate,unit);
  const trendSource=trendMode==="filter"?data:rangeRaw;
  const trendData=buckets.map(bk=>{const r=trendSource.filter(d=>getBucket(d.updated,unit)===bk);const rAll=rangeRaw.filter(d=>getBucket(d.updated,unit)===bk);return{label:bk,squad:r.filter(d=>d.loai==="Squad").length,duan:r.filter(d=>d.loai==="Du_an").length,vh:r.filter(d=>d.loai==="Van_hoa").length,squadAll:rAll.filter(d=>d.loai==="Squad").length,duanAll:rAll.filter(d=>d.loai==="Du_an").length,vhAll:rAll.filter(d=>d.loai==="Van_hoa").length};});
  const spBuckets=buckets.slice(-7);
  const sparkData=loai=>spBuckets.map(bk=>({v:rangeRaw.filter(d=>getBucket(d.updated,unit)===bk&&(!loai||d.loai===loai)).length}));

  const cancelledSt=(SG.find(g=>g.id==="pending")?.jiraStatuses||[]).filter(s=>s.toLowerCase().includes("cancel"));
  const dynNhomSD=[...new Set(ACTIVE_DATA.filter(d=>d.loai!=="Van_hoa"&&d.nhom).map(d=>d.nhom))].sort();
  const dynNhomVH=[...new Set(ACTIVE_DATA.filter(d=>d.loai==="Van_hoa"&&d.nhom).map(d=>d.nhom))].sort();
  const getNhomLabel=n=>cfg.nhomLabels[n]||n.replace(/-/g," ").replace(/\//g," / ");
  const dynamicAssignees=[...new Set([...ASSIGNEES,...ACTIVE_DATA.map(d=>d.assignee).filter(Boolean)])].filter(a=>a!=="Unassigned");
  const assigneeRows=dynamicAssignees.map((a,i)=>{
    const tasks=data.filter(d=>d.assignee===a);

    const closed=tasks.filter(d=>getGrp(d.status)?.id==="closed").length;

    const open=tasks.filter(d=>getGrp(d.status)?.id==="open").length;
    const cr=valid.length?Math.round(closed/valid.length*100):0;
    const od=tasks.filter(d=>d.due<TODAY&&getGrp(d.status)?.id!=="closed").length;
    return{name:a,av:a.slice(0,2),color:AVT_COLORS[i],t:tasks.length,closed,ip,open,cr,od};
  }).filter(a=>a.t>0).sort((a,b)=>b.t-a.t);

  const teamCR=getCompletionRate(data,SG);
  const topPerformer=assigneeRows.length?assigneeRows.reduce((b,a)=>a.cr>b.cr?a:b):null;
  const mostOverdue=assigneeRows.length?assigneeRows.reduce((w,a)=>a.od>w.od?a:w):null;

  const hmMap={};data.forEach(d=>{hmMap[d.hang_muc]=(hmMap[d.hang_muc]||0)+1;});
  const topHM=Object.entries(hmMap).sort((a,b)=>b[1]-a[1]).slice(0,9).map(([name,value])=>({name,value}));
  // Hang_muc_chuan chart data
  const hmChuanMap={};data.forEach(d=>{if(d.hang_muc_chuan)hmChuanMap[d.hang_muc_chuan]=(hmChuanMap[d.hang_muc_chuan]||0)+1;});
  const topHMChuan=Object.entries(hmChuanMap).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([name,value])=>({name,value,pct:total?Math.round(value/total*100):0}));
  // Hang_muc_con chart data  
  const hmConMap={};data.forEach(d=>{if(d.hang_muc_con)hmConMap[d.hang_muc_con]=(hmConMap[d.hang_muc_con]||0)+1;});
  const topHMCon=Object.entries(hmConMap).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([name,value])=>({name,value}));
  // All unique hang_muc + hang_muc_chuan for filters
  const allHangMuc=[...new Set(ACTIVE_DATA.map(d=>d.hang_muc))].sort();
  const allHangMucChuan=[...new Set(ACTIVE_DATA.filter(d=>d.hang_muc_chuan).map(d=>d.hang_muc_chuan))].sort();
  const dtSquad=[...new Set(ACTIVE_DATA.filter(d=>d.loai==="Squad").map(d=>d.doi_tuong))].sort().map(dt=>({name:dt,t:data.filter(d=>d.doi_tuong===dt).length,_f:dt}));
  const dtDuan=[...new Set(ACTIVE_DATA.filter(d=>d.loai==="Du_an").map(d=>d.doi_tuong))].sort().map(dt=>({name:dt.replace("Dự án ",""),t:data.filter(d=>d.doi_tuong===dt).length,_f:dt}));
  const vhPie=dynNhomVH.map(n=>({name:getNhomLabel(n),value:data.filter(d=>d.nhom===n).length}));
  const rS=sN?Math.round(data.filter(d=>d.loai==="Squad"&&getGrp(d.status)?.id==="closed").length/sN*100):0;
  const rD=dN?Math.round(data.filter(d=>d.loai==="Du_an"&&getGrp(d.status)?.id==="closed").length/dN*100):0;
  const rV=vN?Math.round(data.filter(d=>d.loai==="Van_hoa"&&getGrp(d.status)?.id==="closed").length/vN*100):0;
  const heatData=ASSIGNEES.map(a=>[...dynNhomSD,...dynNhomVH].map(n=>({v:data.filter(d=>d.assignee===a&&d.nhom===n).length})));
  const tableRows=data.filter(d=>!search||[d.doi_tuong,d.hang_muc,d.assignee,d.note].some(v=>v&&v.toLowerCase().includes(search.toLowerCase())));
  const totalPages=Math.ceil(tableRows.length/PER);

        {syncError&&<div style={{marginBottom:10,padding:"8px 14px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,fontSize:11,color:"#EF4444",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span>&#9888; Loi ket noi Sheet: {syncError}</span><button onClick={doFetch} style={{background:"rgba(239,68,68,0.15)",border:"none",borderRadius:6,color:"#EF4444",fontSize:10,cursor:"pointer",padding:"2px 8px"}}>Thu lai</button></div>}{debugInfo&&!syncError&&<div style={{marginBottom:10,padding:"6px 14px",background:"rgba(0,201,167,0.06)",border:"1px solid rgba(0,201,167,0.2)",borderRadius:8,fontSize:10,color:"#00C9A7"}}>{debugInfo}</div>}
  <div style={{position:"relative",marginBottom:14}} ref={pickerRef}>
          <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}><button onClick={()=>setShowPicker(o=>!o)} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 14px",background:showPicker?`${C.accent}18`:"rgba(255,255,255,0.04)",border:showPicker?`1px solid ${C.accent}50`:"1px solid rgba(255,255,255,0.08)",borderRadius:10,cursor:"pointer",transition:"all .15s"}}><span style={{fontSize:14}}>&#128197;</span><div style={{textAlign:"left"}}><div style={{fontSize:12,fontWeight:600,color:"#E8EAF0"}}>{fmtD(startDate)} – {fmtD(endDate)}</div><div style={{fontSize:9,color:"#4B5EA6",marginTop:1}}>{days} ngày · So với: {prevLabel}</div></div><span style={{fontSize:11,color:"#4B5EA6"}}>▾</span></button><div style={{display:"flex",alignItems:"center",gap:6,padding:"5px 11px",background:"rgba(123,158,255,0.06)",border:"1px solid rgba(123,158,255,0.1)",borderRadius:8}}><span style={{fontSize:10,color:"#4B5EA6"}}>Đơn vị trục X:</span><span style={{fontSize:11,fontWeight:700,color:C.squad}}>{unitLbl}</span></div></div>
          {showPicker&&<DatePicker start={dateRange.start} end={dateRange.end} onApply={(s,e)=>{setDateRange({start:s,end:e});setShowPicker(false);setPage(1);}} onClose={()=>setShowPicker(false)} accent={C.accent}/>}
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:16}}>{sortedSections.map(key=>renderSection(key))}</div>
      </div>
      {showSettings&&<><div onClick={()=>setShowSettings(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",zIndex:299}}/><SettingsPanel cfg={cfg} onUpdate={setCfg} onClose={()=>setShowSettings(false)} onReset={()=>{setCfg(DEFAULT_CONFIG);try{localStorage.removeItem("cm_cfg_v10");}catch{}}} onExport={()=>{const b=new Blob([JSON.stringify(cfg,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="dashboard_config.json";a.click();}}/></>}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(DashboardApp));
</script>
</body>
</html>
